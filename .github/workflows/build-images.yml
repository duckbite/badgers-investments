name: Build and push images (prod)

on:
  workflow_call:
    inputs:
      image_tag:
        description: Image tag to push (should be immutable, typically git SHA).
        required: true
        type: string
      checkout_ref:
        description: Git ref (SHA, branch) to check out before build; empty uses the caller default SHA.
        required: false
        type: string
        default: ""
    secrets:
      aws_role_arn:
        description: AWS IAM role ARN to assume via OIDC.
        required: true

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPO_PREFIX: ${{ vars.ECR_REPO_PREFIX }}
      IMAGE_TAG: ${{ inputs.image_tag }}
      DOCKER_PLATFORMS: ${{ vars.DOCKER_PLATFORMS || 'linux/amd64,linux/arm64' }}
      TURBO_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref != '' && inputs.checkout_ref || github.sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.aws_role_arn }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push images
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${AWS_REGION}" ]]; then
            echo "Missing vars.AWS_REGION" >&2
            exit 1
          fi
          if [[ -z "${ECR_REPO_PREFIX}" ]]; then
            echo "Missing vars.ECR_REPO_PREFIX (e.g. badgers-investments-prod)" >&2
            exit 1
          fi

          AWS_ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          API_REPO="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_PREFIX}-api"
          WEB_REPO="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_PREFIX}-web"
          WORKER_REPO="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_PREFIX}-worker"

          function does_tag_exist() {
            local repo_name="$1"
            local tag="$2"
            aws ecr describe-images --repository-name "${repo_name}" --image-ids "imageTag=${tag}" --region "${AWS_REGION}" >/dev/null 2>&1
          }

          function build_and_push() {
            local dockerfile="$1"
            local full_repo="$2"
            local tag="$3"
            local repo_name="${full_repo#*/}"
            if does_tag_exist "${repo_name}" "${tag}"; then
              echo "Skipping push (immutable tag already exists): ${full_repo}:${tag}"
              return 0
            fi
            docker buildx build \
              --platform "${DOCKER_PLATFORMS}" \
              -f "${dockerfile}" \
              -t "${full_repo}:${tag}" \
              --push \
              .
          }

          # Order: back-end images (API, worker) then front-end (web), after infra validation in the caller workflow.
          build_and_push "services/api/Dockerfile" "${API_REPO}" "${IMAGE_TAG}"
          build_and_push "workers/worker/Dockerfile" "${WORKER_REPO}" "${IMAGE_TAG}"
          build_and_push "apps/web/Dockerfile" "${WEB_REPO}" "${IMAGE_TAG}"

