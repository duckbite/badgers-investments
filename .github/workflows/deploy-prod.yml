name: Deploy production (serverless)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:
  ci:
    name: CI (lint, test, build)
    uses: ./.github/workflows/ci-reusable.yml

  qualify:
    name: Decide whether to deploy
    needs: [ci]
    if: needs.ci.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.decide.outputs.should_deploy }}
      infra: ${{ steps.decide.outputs.infra }}
      deploy_ref: ${{ steps.decide.outputs.deploy_ref }}
    steps:
      - name: Checkout (path filter)
        if: github.event_name == 'push'
        uses: actions/checkout@v4

      - name: Paths filter
        if: github.event_name == 'push'
        id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event.before }}
          ref: ${{ github.event.after }}
          filters: |
            infra:
              - 'infra/**'
            backend:
              - 'services/**'
              - 'workers/**'
              - 'shared/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - 'turbo.json'
            frontend:
              - 'apps/web/**'
              - 'shared/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - 'turbo.json'
            cd_workflow:
              - '.github/workflows/deploy-prod.yml'
              - '.github/workflows/ci-reusable.yml'

      - name: Set deploy decision
        id: decide
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_deploy=true" >>"$GITHUB_OUTPUT"
            echo "infra=true" >>"$GITHUB_OUTPUT"
            echo "deploy_ref=${{ github.sha }}" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          INFRA="${{ steps.filter.outputs.infra }}"
          BACKEND="${{ steps.filter.outputs.backend }}"
          FRONTEND="${{ steps.filter.outputs.frontend }}"
          CDW="${{ steps.filter.outputs.cd_workflow }}"
          REF="${{ github.event.after }}"

          echo "deploy_ref=${REF}" >>"$GITHUB_OUTPUT"
          echo "infra=${INFRA}" >>"$GITHUB_OUTPUT"

          if [[ "${INFRA}" == "true" || "${BACKEND}" == "true" || "${FRONTEND}" == "true" || "${CDW}" == "true" ]]; then
            echo "should_deploy=true" >>"$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >>"$GITHUB_OUTPUT"
          fi

  infra_precheck:
    name: Terraform validate (prod)
    needs: [qualify]
    if: needs.qualify.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    env:
      TURBO_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.qualify.outputs.deploy_ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2
          run_install: false

      - name: Terraform validate (prod)
        if: needs.qualify.outputs.infra == 'true' || github.event_name == 'workflow_dispatch'
        run: pnpm infra:validate

      - name: Skip Terraform (no infra path changes)
        if: needs.qualify.outputs.infra != 'true' && github.event_name == 'push'
        run: echo "No infra/terraform paths in this push; skipping terraform validate."

  deploy:
    name: Sync web + Lambda code + smoke
    needs: [qualify, infra_precheck]
    if: needs.qualify.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      S3_WEB_BUCKET: ${{ vars.S3_WEB_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
      LAMBDA_API_FUNCTION_NAME: ${{ vars.LAMBDA_API_FUNCTION_NAME }}
      LAMBDA_WORKER_FUNCTION_NAME: ${{ vars.LAMBDA_WORKER_FUNCTION_NAME }}
      API_DOMAIN: ${{ vars.API_DOMAIN }}
      WEB_DOMAIN: ${{ vars.WEB_DOMAIN }}
      TURBO_TELEMETRY_DISABLED: "1"
      PUBLIC_API_BASE_URL: https://${{ vars.API_DOMAIN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.qualify.outputs.deploy_ref }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify GitHub vars
        shell: bash
        run: |
          set -euo pipefail
          for v in AWS_REGION S3_WEB_BUCKET CLOUDFRONT_DISTRIBUTION_ID LAMBDA_API_FUNCTION_NAME LAMBDA_WORKER_FUNCTION_NAME API_DOMAIN WEB_DOMAIN; do
            eval "val=\${$v:-}"
            if [[ -z "$val" ]]; then
              echo "Missing GitHub Actions variable: $v" >&2
              exit 1
            fi
          done

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static web
        run: pnpm --filter web build

      - name: Build Lambda bundles
        run: |
          pnpm --filter api build:lambda
          pnpm --filter worker build:lambda

      - name: Package and upload API Lambda
        shell: bash
        run: |
          set -euo pipefail
          (cd services/api/dist-lambda && zip -qr "$GITHUB_WORKSPACE/api-lambda.zip" .)
          aws lambda update-function-code \
            --function-name "${LAMBDA_API_FUNCTION_NAME}" \
            --zip-file "fileb://${GITHUB_WORKSPACE}/api-lambda.zip"

      - name: Package and upload worker Lambda
        shell: bash
        run: |
          set -euo pipefail
          (cd workers/worker/dist-lambda && zip -qr "$GITHUB_WORKSPACE/worker-lambda.zip" .)
          aws lambda update-function-code \
            --function-name "${LAMBDA_WORKER_FUNCTION_NAME}" \
            --zip-file "fileb://${GITHUB_WORKSPACE}/worker-lambda.zip"

      - name: Sync web to S3
        shell: bash
        run: |
          set -euo pipefail
          aws s3 sync apps/web/build "s3://${S3_WEB_BUCKET}/" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"

      - name: Smoke test
        shell: bash
        run: |
          set -euo pipefail
          function wait_for_http_200() {
            local url="$1"
            local label="$2"
            local max_attempts="${3:-30}"
            local sleep_seconds="${4:-5}"
            local attempt=1
            while [[ "${attempt}" -le "${max_attempts}" ]]; do
              if curl -fsSL --max-time 10 "${url}" >/dev/null; then
                echo "${label} OK: ${url}"
                return 0
              fi
              echo "${label} not ready yet (attempt ${attempt}/${max_attempts}): ${url}"
              sleep "${sleep_seconds}"
              attempt=$((attempt + 1))
            done
            echo "${label} FAILED after ${max_attempts} attempts: ${url}" >&2
            return 1
          }

          wait_for_http_200 "https://${API_DOMAIN}/health" "API health"
          wait_for_http_200 "https://${API_DOMAIN}/ready" "API readiness"
          wait_for_http_200 "https://${WEB_DOMAIN}/" "Web root"
