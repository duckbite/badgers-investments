name: Deploy production (AWS ECS)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: current commit SHA)."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:
  ci:
    name: CI (lint, test, build)
    uses: ./.github/workflows/ci-reusable.yml

  qualify:
    name: Decide whether to deploy
    needs: [ci]
    if: needs.ci.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.decide.outputs.should_deploy }}
      infra: ${{ steps.decide.outputs.infra }}
      deploy_ref: ${{ steps.decide.outputs.deploy_ref }}
      image_tag: ${{ steps.decide.outputs.image_tag }}
    steps:
      - name: Checkout (path filter)
        if: github.event_name == 'push'
        uses: actions/checkout@v4

      - name: Paths filter
        if: github.event_name == 'push'
        id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event.before }}
          ref: ${{ github.event.after }}
          filters: |
            infra:
              - 'infra/**'
            backend:
              - 'services/**'
              - 'workers/**'
              - 'shared/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - 'turbo.json'
              - 'services/api/Dockerfile'
              - 'workers/worker/Dockerfile'
            frontend:
              - 'apps/web/**'
              - 'shared/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - 'turbo.json'
              - 'apps/web/Dockerfile'
            cd_workflow:
              - '.github/workflows/build-images.yml'
              - '.github/workflows/deploy-prod.yml'
              - '.github/workflows/ci-reusable.yml'

      - name: Set deploy decision
        id: decide
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            REF="${{ github.sha }}"
            TAG="${{ inputs.image_tag }}"
            if [[ -z "${TAG}" ]]; then
              TAG="${REF}"
            fi
            echo "should_deploy=true" >>"$GITHUB_OUTPUT"
            echo "infra=true" >>"$GITHUB_OUTPUT"
            echo "deploy_ref=${REF}" >>"$GITHUB_OUTPUT"
            echo "image_tag=${TAG}" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          INFRA="${{ steps.filter.outputs.infra }}"
          BACKEND="${{ steps.filter.outputs.backend }}"
          FRONTEND="${{ steps.filter.outputs.frontend }}"
          CDW="${{ steps.filter.outputs.cd_workflow }}"
          REF="${{ github.event.after }}"

          echo "deploy_ref=${REF}" >>"$GITHUB_OUTPUT"
          echo "image_tag=${REF}" >>"$GITHUB_OUTPUT"
          echo "infra=${INFRA}" >>"$GITHUB_OUTPUT"

          if [[ "${INFRA}" == "true" || "${BACKEND}" == "true" || "${FRONTEND}" == "true" || "${CDW}" == "true" ]]; then
            echo "should_deploy=true" >>"$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >>"$GITHUB_OUTPUT"
          fi

  infra_precheck:
    name: Infra validation (before images)
    needs: [qualify]
    if: needs.qualify.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    env:
      TURBO_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.qualify.outputs.deploy_ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2
          run_install: false

      - name: Terraform validate (prod)
        if: needs.qualify.outputs.infra == 'true' || github.event_name == 'workflow_dispatch'
        run: pnpm infra:validate

      - name: Skip Terraform (no infra / CD workflow path changes)
        if: needs.qualify.outputs.infra != 'true' && github.event_name == 'push'
        run: echo "No infra/terraform paths in this push; skipping terraform validate."

  build_images:
    name: Build and push images
    needs: [qualify, infra_precheck]
    if: needs.qualify.outputs.should_deploy == 'true'
    uses: ./.github/workflows/build-images.yml
    with:
      image_tag: ${{ needs.qualify.outputs.image_tag }}
      checkout_ref: ${{ needs.qualify.outputs.deploy_ref }}
    secrets:
      aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}

  deploy:
    name: Deploy to ECS + smoke test
    needs: [qualify, build_images]
    if: needs.qualify.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPO_PREFIX: ${{ vars.ECR_REPO_PREFIX }}
      ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME }}
      ECS_API_SERVICE_NAME: ${{ vars.ECS_API_SERVICE_NAME }}
      ECS_WEB_SERVICE_NAME: ${{ vars.ECS_WEB_SERVICE_NAME }}
      API_DOMAIN: ${{ vars.API_DOMAIN }}
      WEB_DOMAIN: ${{ vars.WEB_DOMAIN }}
      IMAGE_TAG: ${{ needs.qualify.outputs.image_tag }}
      TURBO_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.qualify.outputs.deploy_ref }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR repositories
        id: ecr
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${AWS_REGION}" ]]; then
            echo "Missing vars.AWS_REGION" >&2
            exit 1
          fi
          if [[ -z "${ECR_REPO_PREFIX}" ]]; then
            echo "Missing vars.ECR_REPO_PREFIX (e.g. badgers-investments-prod)" >&2
            exit 1
          fi
          AWS_ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          echo "api_repo=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_PREFIX}-api" >> "$GITHUB_OUTPUT"
          echo "web_repo=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_PREFIX}-web" >> "$GITHUB_OUTPUT"

      - name: Deploy API and web services (rolling)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${ECS_CLUSTER_NAME}" ]]; then
            echo "Missing vars.ECS_CLUSTER_NAME" >&2
            exit 1
          fi
          if [[ -z "${ECS_API_SERVICE_NAME}" || -z "${ECS_WEB_SERVICE_NAME}" ]]; then
            echo "Missing vars.ECS_API_SERVICE_NAME or vars.ECS_WEB_SERVICE_NAME" >&2
            exit 1
          fi

          API_IMAGE="${{ steps.ecr.outputs.api_repo }}:${IMAGE_TAG}"
          WEB_IMAGE="${{ steps.ecr.outputs.web_repo }}:${IMAGE_TAG}"

          function register_new_task_definition() {
            local service_name="$1"
            local container_name="$2"
            local new_image="$3"

            CURRENT_TD_ARN="$(aws ecs describe-services --cluster "${ECS_CLUSTER_NAME}" --services "${service_name}" --query 'services[0].taskDefinition' --output text)"
            CURRENT_TD_JSON="$(aws ecs describe-task-definition --task-definition "${CURRENT_TD_ARN}" --query 'taskDefinition' --output json)"

            NEW_TD_JSON="$(echo "${CURRENT_TD_JSON}" | jq \
              --arg container_name "${container_name}" \
              --arg new_image "${new_image}" \
              'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy) |
               .containerDefinitions = (.containerDefinitions | map(if .name == $container_name then .image = $new_image else . end))')"

            aws ecs register-task-definition --cli-input-json "${NEW_TD_JSON}" --query 'taskDefinition.taskDefinitionArn' --output text
          }

          echo "Registering new API task definition."
          NEW_API_TD_ARN="$(register_new_task_definition "${ECS_API_SERVICE_NAME}" "api" "${API_IMAGE}")"
          echo "Registering new web task definition."
          NEW_WEB_TD_ARN="$(register_new_task_definition "${ECS_WEB_SERVICE_NAME}" "web" "${WEB_IMAGE}")"

          echo "Updating ECS services."
          aws ecs update-service --cluster "${ECS_CLUSTER_NAME}" --service "${ECS_API_SERVICE_NAME}" --task-definition "${NEW_API_TD_ARN}" >/dev/null
          aws ecs update-service --cluster "${ECS_CLUSTER_NAME}" --service "${ECS_WEB_SERVICE_NAME}" --task-definition "${NEW_WEB_TD_ARN}" >/dev/null

          echo "Waiting for ECS services to stabilize."
          aws ecs wait services-stable --cluster "${ECS_CLUSTER_NAME}" --services "${ECS_API_SERVICE_NAME}" "${ECS_WEB_SERVICE_NAME}"

      - name: Smoke test
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${API_DOMAIN}" || -z "${WEB_DOMAIN}" ]]; then
            echo "Missing vars.API_DOMAIN or vars.WEB_DOMAIN" >&2
            exit 1
          fi

          function wait_for_http_200() {
            local url="$1"
            local label="$2"
            local max_attempts="${3:-30}"
            local sleep_seconds="${4:-5}"
            local attempt=1
            while [[ "${attempt}" -le "${max_attempts}" ]]; do
              if curl -fsSL --max-time 10 "${url}" >/dev/null; then
                echo "${label} OK: ${url}"
                return 0
              fi
              echo "${label} not ready yet (attempt ${attempt}/${max_attempts}): ${url}"
              sleep "${sleep_seconds}"
              attempt=$((attempt + 1))
            done
            echo "${label} FAILED after ${max_attempts} attempts: ${url}" >&2
            return 1
          }

          wait_for_http_200 "https://${API_DOMAIN}/health" "API health"
          wait_for_http_200 "https://${API_DOMAIN}/ready" "API readiness"
          wait_for_http_200 "https://${WEB_DOMAIN}/" "Web root"
