name: Deploy production (AWS serverless)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy static web to S3 + invalidate CloudFront
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      WEB_S3_BUCKET: ${{ vars.WEB_S3_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
      TURBO_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter web build

      - name: Upload web to S3
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${WEB_S3_BUCKET}" ]]; then
            echo "Missing vars.WEB_S3_BUCKET" >&2
            exit 1
          fi
          aws s3 sync "apps/web/build" "s3://${WEB_S3_BUCKET}" --delete

      - name: Invalidate CloudFront
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CLOUDFRONT_DISTRIBUTION_ID}" ]]; then
            echo "Missing vars.CLOUDFRONT_DISTRIBUTION_ID" >&2
            exit 1
          fi
          aws cloudfront create-invalidation --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" --paths "/*" >/dev/null
          echo "Invalidation submitted."

